<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" role="img" aria-label="Virtual assistant working at a laptop">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#0b64c4"/>
			<stop offset="1" stop-color="#003a7a"/>
		</linearGradient>
	</defs>
	<rect width="800" height="680" fill="url(#bg)"/>
	<circle cx="640" cy="120" r="120" fill="#ffffff" opacity="0.06"/>
	<circle cx="90" cy="560" r="160" fill="#f7a600" opacity="0.10"/>

	<!-- desk -->
	<rect x="140" y="470" width="520" height="18" rx="4" fill="#ffffff" opacity="0.14"/>
	<!-- laptop base -->
	<rect x="330" y="430" width="220" height="42" rx="6" fill="#ffffff" opacity="0.92"/>
	<!-- laptop screen -->
	<rect x="345" y="300" width="190" height="132" rx="8" fill="#0b1f33"/>
	<rect x="358" y="313" width="164" height="106" rx="4" fill="#e8f1fb"/>
	<rect x="372" y="330" width="90" height="10" rx="5" fill="#004ea8" opacity="0.6"/>
	<rect x="372" y="350" width="130" height="8" rx="4" fill="#004ea8" opacity="0.35"/>
	<rect x="372" y="366" width="110" height="8" rx="4" fill="#004ea8" opacity="0.35"/>
	<rect x="372" y="382" width="70" height="8" rx="4" fill="#f7a600" opacity="0.8"/>

	<!-- person (simple, abstract) -->
	<circle cx="440" cy="230" r="34" fill="#ffd9a0"/>
	<path d="M380 340c0-44 36-70 60-70s60 26 60 70z" fill="#004ea8"/>
	<path d="M380 340c0-44 36-70 60-70" fill="none" stroke="#003a7a" stroke-width="4"/>

	<!-- chat bubbles floating -->
	<g opacity="0.95">
		<rect x="560" y="200" width="150" height="70" rx="16" fill="#ffffff"/>
		<circle cx="590" cy="235" r="7" fill="#004ea8" opacity="0.5"/>
		<rect x="608" y="222" width="80" height="8" rx="4" fill="#004ea8" opacity="0.35"/>
		<rect x="608" y="238" width="60" height="8" rx="4" fill="#004ea8" opacity="0.25"/>
		<path d="M572 270l-14 18 22-6z" fill="#ffffff"/>
	</g>
	<g opacity="0.95">
		<rect x="110" y="120" width="150" height="64" rx="16" fill="#ffffff"/>
		<circle cx="200" cy="152" r="18" fill="#f7a600" opacity="0.8"/>
		<path d="M195 152l4 4 8-9" stroke="#0b1f33" stroke-width="2.4" fill="none"/>
		<rect x="140" y="140" width="40" height="8" rx="4" fill="#004ea8" opacity="0.3"/>
		<rect x="140" y="156" width="55" height="8" rx="4" fill="#004ea8" opacity="0.2"/>
	</g>
</svg>
